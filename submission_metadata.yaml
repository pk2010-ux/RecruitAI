  is done locally. No candidate data was fed to any LLM.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Four-stage hybrid ranking pipeline. Stage 1: Hard filters eliminate
  non-tech candidates and ~80 honeypots using timeline/skill impossibility
  checks. Stage 2: Rule-based multi-dimensional scoring on 7 axes
  (title fit, skills match, career quality, experience band, education,
  location, behavioral signals) with weights derived from JD analysis.
  Stage 3: Sentence-transformer (MiniLM-L6-v2) semantic similarity on
  top 2000 candidates to catch keyword-absent but contextually fitting
  profiles. Stage 4: Weighted blend of rule + semantic scores with
  behavioral multiplier (activity, responsiveness, availability).
  Anti-keyword-stuffing: skills weighted by proficiency × duration ×
  endorsements. Consulting-only penalty per JD guidance. Runtime ~3
  minutes on CPU for 100K candidates.

